<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 学习打卡 - Bill's Learning Tracker</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --success: #10b981;
    --warning: #f59e0b;
    --border: #2d2d4a;
    --sidebar-w: 260px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
  }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar-w);
    min-height: 100vh;
    background: var(--card);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 0; left: 0;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s;
  }
  #sidebar h2 {
    padding: 20px 16px 12px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .week-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 16px;
    background: none;
    border: none;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    border-left: 3px solid transparent;
    transition: all 0.2s;
  }
  .week-btn:hover { background: rgba(124,58,237,0.1); }
  .week-btn.active {
    background: rgba(124,58,237,0.15);
    border-left-color: var(--accent);
    color: #c4b5fd;
  }
  .week-btn .w-num {
    font-size: 11px;
    background: var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    min-width: 20px;
    text-align: center;
  }
  .week-btn.done .w-num { background: var(--success); color: #fff; }
  .week-btn.current .w-num { background: var(--accent); color: #fff; }
  .week-progress {
    padding: 8px 16px 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Main */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 0;
  }

  /* Header */
  #main-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(15,15,26,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #main-header h1 {
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #streak-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,158,11,0.15);
    border: 1px solid rgba(245,158,11,0.3);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: #fbbf24;
  }

  /* Week Header */
  #week-header {
    padding: 32px 40px 20px;
    border-bottom: 1px solid var(--border);
  }
  #week-header .week-tag {
    font-size: 12px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  #week-header h2 { font-size: 26px; margin-bottom: 8px; }
  #week-header .goals {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  #week-header .goal-tag {
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    color: #c4b5fd;
  }

  /* Content area */
  #content-area {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
    min-height: calc(100vh - 80px);
  }

  /* Sections */
  .section {
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
  }
  .section h3 {
    font-size: 16px;
    color: #e2e8f0;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section h3 .icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .section p { color: var(--muted); font-size: 14px; line-height: 1.7; }

  /* Code blocks */
  .code-block {
    background: #0d0d1a;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 12px 0;
    overflow: hidden;
  }
  .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: rgba(45,45,74,0.5);
    border-bottom: 1px solid var(--border);
  }
  .code-header span { font-size: 12px; color: var(--muted); font-family: monospace; }
  .run-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 4px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .run-btn:hover { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .code-block pre {
    padding: 16px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    color: #a9b1d6;
    max-height: 400px;
    overflow-y: auto;
  }
  .code-block pre .kw { color: #bb9af7; }
  .code-block pre .str { color: #9ece6a; }
  .code-block pre .cm { color: #565f89; font-style: italic; }
  .code-block pre .fn { color: #7dcfff; }
  .code-block pre .nb { color: #ff9e64; }
  .code-output {
    padding: 10px 14px;
    background: #070711;
    border-top: 1px solid var(--border);
    font-family: monospace;
    font-size: 13px;
    color: #9aa5ce;
    min-height: 36px;
    white-space: pre-wrap;
  }
  .code-output.error { color: #f7768e; }

  /* Practice section */
  .practice-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .practice-card h4 {
    font-size: 15px;
    margin-bottom: 10px;
    color: #e2e8f0;
  }
  .practice-card p { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .check-in-btn {
    background: linear-gradient(135deg, var(--success), #059669);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .check-in-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
  .check-in-btn.checked {
    background: var(--border);
    color: var(--muted);
    cursor: default;
    transform: none;
    box-shadow: none;
  }

  /* Daily plan */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 14px;
  }
  .day-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .day-item .day-name { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .day-item .day-status { font-size: 16px; margin-top: 4px; }
  .day-item:hover { border-color: var(--accent); }
  .day-item.done { border-color: var(--success); background: rgba(16,185,129,0.08); }
  .day-item.done .day-status { color: var(--success); }
  .day-item.current { border-color: var(--accent); background: rgba(124,58,237,0.1); }
  .day-item.current .day-status { color: var(--accent); }

  /* Right panel */
  #right-panel {
    border-left: 1px solid var(--border);
    padding: 24px 20px;
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
  }
  #right-panel h3 {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }

  /* Pyodide console */
  #py-console {
    background: #0d0d1a;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  #py-console-header {
    padding: 8px 12px;
    background: rgba(45,45,74,0.5);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .py-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f59e0b;
  }
  .py-status.ready { background: var(--success); }
  #py-output {
    padding: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    min-height: 120px;
    max-height: 220px;
    overflow-y: auto;
    color: #9aa5ce;
    white-space: pre-wrap;
  }
  #py-output .py-out { color: #9aa5ce; }
  #py-output .py-err { color: #f7768e; }
  #py-input-row {
    display: flex;
    border-top: 1px solid var(--border);
  }
  #py-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 12px;
    color: #e2e8f0;
    font-family: monospace;
    font-size: 13px;
    outline: none;
  }
  #py-run-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0 16px;
    cursor: pointer;
    font-size: 13px;
  }

  /* Code runner textarea */
  .code-editor {
    width: 100%;
    background: #0d0d1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    color: #a9b1d6;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s;
  }
  .code-editor:focus { border-color: var(--accent); }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-card .stat-val {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-card .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .section { animation: fadeIn 0.3s ease; }

  /* Mobile */
  @media (max-width: 900px) {
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #main { margin-left: 0; }
    #content-area { grid-template-columns: 1fr; }
    #right-panel { position: static; height: auto; border-left: none; border-top: 1px solid var(--border); }
    .day-grid { grid-template-columns: repeat(4, 1fr); }
  }
  #menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    margin-right: 12px;
  }
  @media (max-width: 900px) { #menu-btn { display: block; } }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <h2>📚 Python 学习</h2>
  <div class="week-progress">
    <span id="total-progress-text">已完成 0/9 周</span>
    <div class="progress-bar"><div class="progress-fill" id="total-progress-bar" style="width:0%"></div></div>
  </div>
  <button class="week-btn active" data-week="1" onclick="showWeek(1)">
    <span class="w-num">1</span> 基础语法
  </button>
  <button class="week-btn" data-week="2" onclick="showWeek(2)">
    <span class="w-num">2</span> 函数与数据结构
  </button>
  <button class="week-btn" data-week="3" onclick="showWeek(3)">
    <span class="w-num">3</span> 文件/JSON/正则
  </button>
  <button class="week-btn" data-week="4" onclick="showWeek(4)">
    <span class="w-num">4</span> pandas与API
  </button>
  <button class="week-btn" data-week="5" onclick="showWeek(5)">
    <span class="w-num">5</span> 数据可视化
  </button>
  <button class="week-btn" data-week="6" onclick="showWeek(6)">
    <span class="w-num">6</span> LLM API调用
  </button>
  <button class="week-btn" data-week="7" onclick="showWeek(7)">
    <span class="w-num">7</span> 定时任务与OCR
  </button>
  <button class="week-btn" data-week="8" onclick="showWeek(8)">
    <span class="w-num">8</span> 综合项目
  </button>
  <button class="week-btn" data-week="9" onclick="showWeek(9)">
    <span class="w-num">9</span> Trae工具实战
  </button>
</div>

<!-- Main -->
<div id="main">
  <div id="main-header">
    <div style="display:flex;align-items:center">
      <button id="menu-btn" onclick="toggleSidebar()">☰</button>
      <h1>🐍 Python 学习打卡</h1>
    </div>
    <div id="streak-badge">🔥 学习连续 <span id="streak-count">0</span> 天</div>
  </div>

  <div id="week-header">
    <div class="week-tag">WEEK <span id="header-week-num">1</span></div>
    <h2 id="header-title">基础语法</h2>
    <p id="header-desc" style="color:var(--muted);font-size:14px;margin-top:4px">掌握变量、数据类型、运算符、条件判断和循环</p>
    <div class="goals" id="header-goals"></div>
  </div>

  <div id="content-area">
    <div>
      <div class="section" id="section-overview"></div>
      <div class="section" id="section-topics"></div>
      <div class="section" id="section-practice"></div>
      <div class="section" id="section-daily"></div>
    </div>

    <!-- Right Panel -->
    <div id="right-panel">
      <h3>📊 学习统计</h3>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="stat-weeks">0</div><div class="stat-label">完成周数</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-days">0</div><div class="stat-label">打卡天数</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-codes">0</div><div class="stat-label">运行代码</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-streak">0</div><div class="stat-label">连续天数</div></div>
      </div>

      <h3>🖥️ Python 控制台</h3>
      <div id="py-console">
        <div id="py-console-header">
          <div class="py-status" id="py-status-dot"></div>
          <span id="py-status-text">加载中...</span>
        </div>
        <div id="py-output"></div>
        <div id="py-input-row">
          <input id="py-input" placeholder="输入 Python 代码后回车运行..." onkeydown="if(event.key==='Enter')runPyCommand()">
          <button id="py-run-btn" onclick="runPyCommand()">运行</button>
        </div>
      </div>

      <h3 style="margin-top:20px">📋 快速修改代码</h3>
      <textarea class="code-editor" id="quick-code" placeholder="输入代码片段，点击上方「运行」按钮"></textarea>
      <button class="run-btn" style="margin-top:8px;width:100%;padding:10px" onclick="runQuickCode()">▶ 运行代码</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// WEEKLY CONTENT DATA
// ============================================================
const WEEKS = [
  {
    num: 1,
    title: "基础语法",
    desc: "掌握变量、数据类型、运算符、条件判断和循环",
    goals: ["变量与数据类型", "运算符", "条件判断", "循环", "猜数字游戏"],
    topics: [
      {
        title: "Hello World",
        icon: "👋",
        content: `<p>Python 的第一行代码，永远从这里开始：</p>
<div class="code-block">
  <div class="code-header"><span>python</span><button class="run-btn" onclick="runCode(this)">▶ 运行</button></div>
  <pre>print("Hello World!")</pre>
  <div class="code-output"></div>
</div>`
      },
      {
        title: "变量与数据类型",
        icon: "📦",
        content: `<p>Python 是动态类型语言，不需要声明类型：</p>
<div class="code-block">
  <div class="code-header"><span>python</span><button class="run-btn" onclick="runCode(this)">▶ 运行</button></div>
  <pre name="code">name = "Bill"          <span class="cm"># 字符串</span>
age = 40               <span class="cm"># 整数</span>
height = 170.5         <span class="cm"># 浮点数</span>
is_student = False     <span class="cm"># 布尔值</span>

print(f"我叫{name}，今年{age}岁，身高{height}cm")</pre>
  <div class="code-output"></div>
</div>
<p>常见数据类型：<code>int</code>, <code>float</code>, <code>str</code>, <code>bool</code>, <code>list</code>, <code>dict</code></p>`
      },
      {
        title: "运算符",
        icon: "🔢",
        content: `<div class="code-block">
  <div class="code-header"><span>python</span><button class="run-btn" onclick="runCode(this)">▶ 运行</button></div>
  <pre>a, b = 10, 3
print(<span class="nb">a</span> + <span class="nb">b</span>)   <span class="cm"># 13</span>
print(<span class="nb">a</span> - <span class="nb">b</span>)   <span class="cm"># 7</span>
print(<span class="nb">a</span> * <span class="nb">b</span>)   <span class="cm"># 30</span>
print(<span class="nb">a</span> / <span class="nb">b</span>)   <span class="cm"># 3.333...</span>
print(<span class="nb">a</span> // <span class="nb">b</span>)  <span class="cm"># 3  (整除)</span>
print(<span class="nb">a</span> % <span class="nb">b</span>)   <span class="cm"># 1  (余数)</span>
print(<span class="nb">a</span> ** <span class="nb">b</span>)  <span class="cm"># 1000 (幂)</span>

<span class="cm"># 比较</span>
print(<span class="nb">a</span> == <span class="nb">b</span>)  <span class="cm"># False</span>
print(<span class="nb">a</span> != <span class="nb">b</span>)  <span class="cm"># True</span>

<span class="cm"># 逻辑</span>
print(<span class="kw">True</span> <span class="kw">and</span> <span class="kw">False</span>)  <span class="cm"># False</span>
print(<span class="kw">True</span> <span class="kw">or</span> <span class="kw">False</span>)   <span class="cm"># True</span>
print(<span class="kw">not</span> <span class="kw">True</span>)        <span class="cm"># False</span></pre>
  <div class="code-output"></div>
</div>`
      },
      {
        title: "条件判断",
        icon: "🔀",
        content: `<div class="code-block">
  <div class="code-header"><span>python</span><button class="run-btn" onclick="runCode(this)">▶ 运行</button></div>
  <pre>score = <span class="nb">85</span>

<span class="kw">if</span> score >= <span class="nb">90</span>:
    print(<span class="str">"优秀"</span>)
<span class="kw">elif</span> score >= <span class="nb">70</span>:
    print(<span class="str">"良好"</span>)
<span class="kw">elif</span> score >= <span class="nb">60</span>:
    print(<span class="str">"及格"</span>)
<span class="kw">else</span>:
    print(<span class="str">"不及格"</span>)</pre>
  <div class="code-output"></div>
</div>`
      },
      {
        title: "for 循环",
        icon: "🔁",
        content: `<div class="code-block">
  <div class="code-header"><span>python</span><button class="run-btn" onclick="runCode(this)">▶ 运行</button></div>
  <pre><span class="cm"># 打印 1~10</span>
<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="nb">1</span>, <span class="nb">11</span>):
    print(i, end=<span class="str">" "</span>)

<span class="cm"># 遍历列表</span>
fruits = [<span class="str">"苹果"</span>, <span class="str">"香蕉"</span>, <span class="str">"橙子"</span>]
<span class="kw">for</span> fruit <span class="kw">in</span> fruits:
    print(fruit)</pre>
  <div class="code-output"></div>
</div>`
      },
      {
        title: "while 循环",

let pyodide = null;
let currentWeek = 1;
let stats = { weeks: 0, days: 0, codes: 0, streak: 0 };
let completedDays = {};  // week -> [day indexes]
let checkedPractices = {};  // week -> [practice indexes]

function loadState() {
  try {
    const s = localStorage.getItem('py-learn-state');
    if (s) {
      const d = JSON.parse(s);
      stats = d.stats || stats;
      completedDays = d.completedDays || {};
      checkedPractices = d.checkedPractices || {};
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('py-learn-state', JSON.stringify({
      stats, completedDays, checkedPractices
    }));
  } catch(e) {}
}

async function initPyodide() {
  const dot = document.getElementById('py-status-dot');
  const text = document.getElementById('py-status-text');
  const output = document.getElementById('py-output');

  try {
    pyodide = await loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/" });
    dot.classList.add('ready');
    text.textContent = 'Python 就绪';
    output.innerHTML = '<span class="py-out">✅ Pyodide 加载成功！可以运行 Python 代码了\n</span>';
    pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
sys.stderr = StringIO()
print("🐍 Python 环境就绪")
`);
    const out = pyodide.runPython('sys.stdout.getvalue()');
    output.innerHTML = `<span class="py-out">✅ Pyodide 加载成功！可以运行 Python 代码了\n</span>`;
  } catch(e) {
    text.textContent = '加载失败';
    output.innerHTML = `<span class="py-err">加载失败: ${e.message}</span>`;
  }
}

function getOutput() {
  try {
    const out = pyodide.runPython('sys.stdout.getvalue()');
    const err = pyodide.runPython('sys.stderr.getvalue()');
    pyodide.runPython('sys.stdout.truncate(0); sys.stdout.seek(0)');
    pyodide.runPython('sys.stderr.truncate(0); sys.stderr.seek(0)');
    return { out, err };
  } catch(e) {
    return { out: '', err: e.message };
  }
}

async function runCode(btn) {
  if (!pyodide) { alert('Python 环境加载中，请稍候...'); return; }
  const block = btn.closest('.code-block');
  const pre = block.querySelector('pre');
  const outDiv = block.querySelector('.code-output');
  const code = pre.innerText;

  btn.disabled = true;
  btn.textContent = '运行中...';
  outDiv.innerHTML = '<span style="color:var(--muted)运行中...</span>';

  try {
    pyodide.runPython('sys.stdout.truncate(0); sys.stdout.seek(0)');
    pyodide.runPython('sys.stderr.truncate(0); sys.stderr.seek(0)');

    await pyodide.runPythonAsync(code);

    const { out, err } = getOutput();
    if (err && err.trim()) {
      outDiv.innerHTML = `<span class="py-err">${err}</span>`;
      outDiv.classList.add('error');
    } else {
      outDiv.textContent = out || '（无输出）';
      outDiv.classList.remove('error');
    }
    stats.codes++;
    updateStats();
    saveState();
  } catch(e) {
    outDiv.innerHTML = `<span class="py-err">${e.message}</span>`;
    outDiv.classList.add('error');
  }

  btn.disabled = false;
  btn.textContent = '▶ 运行';
}

async function runQuickCode() {
  const code = document.getElementById('quick-code').value;
  if (!code.trim()) return;
  const fakeBtn = document.querySelector('#right-panel .run-btn');
  fakeBtn.textContent = '运行中...';

  try {
    pyodide.runPython('sys.stdout.truncate(0); sys.stdout.seek(0)');
    pyodide.runPython('sys.stderr.truncate(0); sys.stderr.seek(0)');
    await pyodide.runPythonAsync(code);
    const { out, err } = getOutput();
    output.innerHTML = (err ? `<span class="py-err">${err}</span>\n` : '') +
                        (out ? `<span class="py-out">${out}</span>` : '<span class="py-out">（无输出）</span>');
    stats.codes++;
    updateStats();
    saveState();
  } catch(e) {
    output.innerHTML = `<span class="py-err">${e.message}</span>`;
  }

  fakeBtn.disabled = false;
  fakeBtn.textContent = '▶ 运行代码';
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toggleDay(week, dayIdx, el) {
  if (!completedDays[week]) completedDays[week] = [];
  const idx = completedDays[week].indexOf(dayIdx);
  if (idx >= 0) {
    completedDays[week].splice(idx, 1);
    el.classList.remove('done');
    el.classList.remove('current');
    el.querySelector('.day-status').textContent = '○';
    updateStreak();
  } else {
    completedDays[week].push(dayIdx);
    el.classList.add('done');
    el.querySelector('.day-status').textContent = '✅';
    updateStreak();
  }
  stats.days = Object.values(completedDays).flat().length;
  updateStats();
  saveState();
}

function togglePractice(week, practiceIdx, btn) {
  if (!checkedPractices[week]) checkedPractices[week] = [];
  const idx = checkedPractices[week].indexOf(practiceIdx);
  if (idx >= 0) {
    checkedPractices[week].splice(idx, 1);
    btn.classList.remove('checked');
    btn.textContent = '✓ 打卡完成';
  } else {
    checkedPractices[week].push(practiceIdx);
    btn.classList.add('checked');
    btn.textContent = '✅ 已完成';
  }
  saveState();
}

function weekCheckIn(week, btn) {
  if (!completedDays[week]) completedDays[week] = [];
  const w = WEEKS[week - 1];
  // Mark all 7 days done
  for (let i = 0; i < 7; i++) {
    if (!completedDays[week].includes(i)) {
      completedDays[week].push(i);
    }
  }
  btn.classList.add('checked');
  btn.textContent = '🎉 本周已完成';
  stats.days = Object.values(completedDays).flat().length;

  // Count completed weeks
  let completed = 0;
  for (let i = 1; i <= 9; i++) {
    if (completedDays[i] && completedDays[i].length >= 7) completed++;

  stats.weeks = completed;
  updateStreak();
  updateStats();
  updateWeekButtons();
  saveState();
  showWeek(week);
}
